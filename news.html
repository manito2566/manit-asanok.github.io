<header class="hero-gradient">
  <div class="container-narrow section-pad">
    <div class="section-divider"></div>
    <h1 class="text-4xl md:text-5xl mb-3" data-i18n="news.title">News & Articles</h1>
    <p class="text-base text-muted max-w-2xl">
      ข่าวสาร กิจกรรม ผลงาน และบทความล่าสุด
    </p>
  </div>
</header>

<main class="container-narrow section-pad">
  <div id="news-list" class="grid md:grid-cols-2 gap-5"></div>
  <div id="news-detail" class="hidden card p-6 md:p-8 mt-6">
    <button id="news-back" class="text-sm font-semibold text-primary hover:underline mb-4">← Back to list</button>
    <div id="news-detail-body" class="prose-news"></div>
  </div>
  <div id="news-empty" class="hidden card p-8 text-center text-muted" data-i18n="news.noNews">No news yet</div>
</main>

<footer id="site-footer" style="background:var(--color-primary-dark);color:white"></footer>

<script src="assets/js/i18n.js"></script>
<script src="assets/js/main.js"></script>
<script>
  (async () => {
    if (window.i18n) await window.i18n.init();
    const lang = window.i18n.lang;

    let posts = [];
    try {
      const r = await fetch('data/news/index.json');
      posts = await r.json();
    } catch (e) {
      posts = [];
    }
    posts.sort((a, b) => b.date.localeCompare(a.date));

    const listEl = document.getElementById('news-list');
    const emptyEl = document.getElementById('news-empty');
    const detailEl = document.getElementById('news-detail');
    const detailBody = document.getElementById('news-detail-body');

    if (posts.length === 0) {
      emptyEl.classList.remove('hidden');
    } else {
      listEl.innerHTML = posts.map(p => `
        <article class="card card-interactive p-5 cursor-pointer" data-slug="${p.slug}">
          <p class="text-xs font-semibold text-accent mb-2">${p.date}</p>
          <h3 class="text-lg mb-2 leading-snug">${window.i18n.pick(p.title)}</h3>
          <p class="text-sm text-muted mb-3">${window.i18n.pick(p.excerpt)}</p>
          <div class="flex flex-wrap gap-1">
            ${(p.tags || []).map(t => `<span class="chip chip-accent text-xs">#${t}</span>`).join('')}
          </div>
          <p class="text-xs font-semibold text-primary mt-3" data-i18n="news.readMore">Read more →</p>
        </article>
      `).join('');

      // Bind click handlers
      listEl.querySelectorAll('[data-slug]').forEach(el => {
        el.addEventListener('click', async () => {
          const slug = el.getAttribute('data-slug');
          const res = await fetch(`data/news/${slug}.md`);
          let text = await res.text();
          // Strip YAML frontmatter if present
          text = text.replace(/^---[\s\S]*?---\s*/, '');
          detailBody.innerHTML = marked.parse(text);
          listEl.classList.add('hidden');
          detailEl.classList.remove('hidden');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    document.getElementById('news-back').addEventListener('click', () => {
      detailEl.classList.add('hidden');
      listEl.classList.remove('hidden');
    });

    if (window.lucide) lucide.createIcons();
  })();
</script>
</body>
</html>
